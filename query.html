<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健檢報名查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#0d7e72;--teal-l:#e6f5f3;--teal-m:#1aab9b;--teal-d:#0a6259;
  --slate:#1e2d3d;--slate-m:#4a5e72;--slate-l:#f4f7fa;
  --purple:#7c3aed;--purple-l:#f3f0ff;--purple-m:#a78bfa;
  --danger:#d94f4f;--success:#27a86e;
  --border:#dde5ed;--white:#fff;
  --shadow:0 4px 24px rgba(13,126,114,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:#edf2f7;min-height:100vh;color:var(--slate);}
header{background:var(--slate);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.18);}
.logo{display:flex;align-items:center;gap:12px;color:white;}
.logo-icon{width:36px;height:36px;background:var(--teal-m);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-text{font-size:16px;font-weight:500;letter-spacing:1px;}
.logo-sub{font-size:11px;color:#8fa0b3;letter-spacing:2px;margin-top:2px;}
.header-year{color:#8fa0b3;font-size:13px;}
main{max-width:720px;margin:0 auto;padding:36px 20px 80px;}
.card{background:var(--white);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;animation:fadeUp .4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card-header{background:linear-gradient(120deg,var(--teal) 0%,#0a6259 100%);padding:24px 36px;color:white;}
.card-header h2{font-size:19px;font-weight:700;}
.card-header p{font-size:13px;opacity:.8;margin-top:5px;}
.card-body{padding:32px 36px;}
.search-row{display:flex;gap:10px;margin-bottom:8px;}
.search-input{flex:1;border:2px solid var(--border);border-radius:8px;padding:12px 16px;font-size:15px;font-family:'Noto Sans TC',sans-serif;color:var(--slate);outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:2px;}
.search-input:focus{border-color:var(--teal-m);box-shadow:0 0 0 3px rgba(26,171,155,.12);}
.search-input::placeholder{letter-spacing:0;color:#b0bec5;}
.btn-search{padding:12px 24px;border-radius:8px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;background:var(--teal);color:white;transition:all .2s;white-space:nowrap;}
.btn-search:hover{background:var(--teal-d);}
.btn-search:disabled{background:var(--border);color:var(--slate-m);cursor:not-allowed;}
.hint-text{font-size:11px;color:var(--slate-m);margin-bottom:20px;}
.result-area{display:none;}
.result-area.visible{display:block;animation:fadeUp .3s ease;}
.result-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.booking-badge{background:var(--teal);color:white;font-size:13px;font-weight:700;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
.result-title{font-size:14px;font-weight:700;color:var(--slate);}
.person-card{border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.person-card-header{padding:10px 16px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;}
.person-card-header.emp{background:var(--teal-l);color:var(--teal);}
.person-card-header.fam{background:var(--purple-l);color:var(--purple);}
.person-card-body{padding:14px 16px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-item{display:flex;flex-direction:column;gap:3px;}
.info-label{font-size:10px;font-weight:700;color:var(--slate-m);letter-spacing:.8px;}
.info-value{font-size:14px;color:var(--slate);font-weight:500;}
.info-item.span2{grid-column:1/-1;}
.plan-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.plan-a{background:var(--teal-l);color:var(--teal);border:1px solid var(--teal-m);}
.plan-b{background:var(--purple-l);color:var(--purple);border:1px solid var(--purple-m);}
.notice-box{background:#f0faf5;border:1.5px solid #a7f3d0;border-radius:10px;padding:11px 16px;font-size:12px;color:#065f46;margin-top:16px;}
.error-box{background:#fff1f1;border:1.5px solid #fca5a5;border-radius:10px;padding:16px;font-size:13px;color:var(--danger);text-align:center;display:none;}
.error-box.visible{display:block;animation:fadeUp .3s ease;}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:400;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.loading-overlay.visible{display:flex;}
.spinner{width:48px;height:48px;border:4px solid var(--teal-l);border-top:4px solid var(--teal);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--slate-m);font-weight:500;}
.btn-back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;border:1.5px solid var(--border);background:var(--slate-l);color:var(--slate);cursor:pointer;text-decoration:none;transition:all .2s;margin-bottom:20px;}
.btn-back:hover{background:var(--border);}
@media(max-width:620px){
  .search-row{flex-direction:column;}
  .card-body,.card-header{padding:20px 18px;}
  .info-grid{grid-template-columns:1fr;}
  main{padding:18px 10px 60px;}
  header{padding:0 14px;}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">查詢中，請稍候...</div>
</div>

<header>
  <div class="logo">
    <div class="logo-icon">🏥</div>
    <div>
      <div class="logo-text">元科/元律</div>
      <div class="logo-sub">Employee Health Check System</div>
    </div>
  </div>
  <div class="header-year">2027年度健檢報名查詢</div>
</header>

<main>
  <a href="index.html" class="btn-back">← 返回報名頁面</a>

  <div class="card">
    <div class="card-header">
      <h2>🔍 輸入報名序號</h2>
      <p>請輸入您的報名序號以查詢報名資料</p>
    </div>
    <div class="card-body">
      <div class="search-row">
        <input class="search-input" type="text" id="refInput"
          placeholder="請輸入報名序號，例：HC12345678"
          maxlength="12"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter')doSearch()">
        <button class="btn-search" id="searchBtn" onclick="doSearch()">查詢</button>
      </div>
      <div class="hint-text">※ 報名序號於報名完成頁面顯示，格式為 HC 開頭共10碼</div>

      <div class="error-box" id="errorBox"></div>

      <div class="result-area" id="resultArea">
        <div class="result-header">
          <div class="result-title">報名序號</div>
          <div class="booking-badge" id="resultBid"></div>
        </div>
        <div id="resultCards"></div>
        <div class="notice-box">
          📌 如需取消或修改報名資料，請聯繫管理部並提供您的報名序號。
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbygMYmPll-_hPiSUwnbfqyGe_Zu7NN-dfdZkIRqeZF2Pr5VOty0LHqWzsb9LmoFS96s/exec';

window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const ref = params.get('ref');
  if(ref){ document.getElementById('refInput').value = ref; doSearch(); }
});

async function doSearch(){
  const ref = document.getElementById('refInput').value.trim();
  if(!ref){ showError('請輸入報名序號'); return; }
  if(!ref.startsWith('HC') || ref.length < 10){ showError('序號格式不正確，請確認是否為 HC 開頭的10碼序號'); return; }

  hideError(); hideResult();
  document.getElementById('loadingOverlay').className = 'loading-overlay visible';
  document.getElementById('searchBtn').disabled = true;

  try {
    const res = await fetch(`${GAS_URL}?action=query&ref=${encodeURIComponent(ref)}`);
    const data = await res.json();
    if(!data.success || !data.rows || data.rows.length === 0){
      showError('查無此報名序號，請確認序號是否正確');
      return;
    }
    renderResult(ref, data.rows);
  } catch(e){
    showError('查詢失敗，請稍後再試');
    console.error(e);
  } finally {
    document.getElementById('loadingOverlay').className = 'loading-overlay';
    document.getElementById('searchBtn').disabled = false;
  }
}

function renderResult(bid, rows){
  document.getElementById('resultBid').textContent = bid;
  const cards = document.getElementById('resultCards');
  cards.innerHTML = '';

  rows.forEach(r => {
    const isEmp = String(r['身份']).trim() === '員工';
    const planA = String(r['A方案3400元']).trim().toUpperCase() === 'V';
    const planB = String(r['B方案6000元']).trim().toUpperCase() === 'V';
    const planBadge = planA
      ? '<span class="plan-badge plan-a">A 方案 NT$ 3,400</span>'
      : planB
      ? '<span class="plan-badge plan-b">B 方案 NT$ 6,000</span>'
      : '—';

    const upgrade = r['自費升等費用'];
    const upgradeDisplay = (upgrade && Number(upgrade) > 0)
      ? 'NT$ ' + Number(upgrade).toLocaleString()
      : '—';

    const addon = r['加選項目'];
    const notes = r['備註'];

    const div = document.createElement('div');
    div.className = 'person-card';
    div.innerHTML = `
      <div class="person-card-header ${isEmp?'emp':'fam'}">
        ${isEmp ? '👤 員工本人' : '👨‍👩‍👧 親友自費'}
        ${!isEmp && r['眷屬關係'] ? `<span style="font-weight:400;margin-left:4px;">（${r['眷屬關係']}）</span>` : ''}
      </div>
      <div class="person-card-body">
        <div class="info-grid">
          <div class="info-item"><div class="info-label">姓名</div><div class="info-value">${r['姓名']||'—'}</div></div>
          <div class="info-item"><div class="info-label">健檢日期</div><div class="info-value">${r['健檢日期'] ? String(r['健檢日期']).slice(0,10) : '—'}</div></div>
          <div class="info-item span2"><div class="info-label">健檢方案</div><div class="info-value">${planBadge}</div></div>
          <div class="info-item"><div class="info-label">自費升等費用</div><div class="info-value">${upgradeDisplay}</div></div>
          <div class="info-item"><div class="info-label">加選項目</div><div class="info-value">${addon||'—'}</div></div>
          ${isEmp ? `
          <div class="info-item"><div class="info-label">公司別</div><div class="info-value">${r['公司別']||'—'}</div></div>
          <div class="info-item"><div class="info-label">職稱</div><div class="info-value">${r['職稱']||'—'}</div></div>
          ` : ''}
          ${notes ? `<div class="info-item span2"><div class="info-label">備註</div><div class="info-value">${notes}</div></div>` : ''}
        </div>
      </div>`;
    cards.appendChild(div);
  });

  document.getElementById('resultArea').className = 'result-area visible';
}

function showError(msg){
  const box = document.getElementById('errorBox');
  box.textContent = '❌ ' + msg;
  box.className = 'error-box visible';
}
function hideError(){ document.getElementById('errorBox').className = 'error-box'; }
function hideResult(){ document.getElementById('resultArea').className = 'result-area'; }
</script>
</body>
</html>
